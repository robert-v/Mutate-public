type: MutateTool
name: "Unescape Backslashes"
jsCode: |-
  function transform(text) {
      if (!text) return "";
      
      // Matches \uXXXX, \xXX, or standard \char escapes
      return text.replace(/\\(?:u([0-9a-fA-F]{4})|x([0-9a-fA-F]{2})|(.))/g, function(match, unicode, hex, char) {
          // Decode Unicode (e.g., \u00A0)
          if (unicode) return String.fromCharCode(parseInt(unicode, 16));
          
          // Decode Hex (e.g., \x20)
          if (hex) return String.fromCharCode(parseInt(hex, 16));
          
          // Decode standard control characters
          switch (char) {
              case 'n': return '\n';
              case 't': return '\t';
              case 'r': return '\r';
              case 'b': return '\b';
              case 'f': return '\f';
              case '\\': return '\\';
              case '"': return '"';
              case "'": return "'";
              default: return char; // If it's an unknown escape, just keep the character
          }
      });
  }